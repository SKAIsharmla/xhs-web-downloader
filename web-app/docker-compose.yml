# ======================================================================
# 小红书图片下载器 — docker compose
#
# 用法：
#   启动：      docker compose up -d
#   停止：      docker compose down
#   查看日志：  docker compose logs -f
#
# 数据持久化：
#   所有数据保存在 web-app/xhs-data/ 目录下
#   ├── config/settings.json    配置文件（Web 页面修改会自动保存）
#   └── downloads/              下载的图片文件
# ======================================================================

services:
  xhs-downloader:
    build:
      context: ..
      dockerfile: web-app/Dockerfile
    image: xhs-web-downloader:latest
    container_name: xhs-downloader
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # 单目录挂载，同时持久化 配置文件 + 下载文件
      - ./xhs-data:/data
    environment:
      - TZ=Asia/Shanghai
