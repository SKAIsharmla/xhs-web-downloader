<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小红书图片下载器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <h1 class="logo">📕 小红书图片下载器</h1>
      <button class="btn btn-ghost" id="settingsBtn" title="设置">⚙ 设置</button>
    </div>
  </header>

  <!-- Main -->
  <main class="container">

    <!-- URL input -->
    <section class="card input-section">
      <label class="input-label" for="urlInput">粘贴小红书帖子链接</label>
      <div class="input-row">
        <input
          type="url"
          id="urlInput"
          class="input"
          placeholder="https://www.xiaohongshu.com/explore/..."
          autofocus
        />
        <button class="btn btn-clear" id="clearBtn" title="清空输入框">✕ 清空</button>
        <button class="btn btn-primary" id="parseBtn">解析</button>
      </div>
      <p class="hint" id="hint">支持 /explore/、/discovery/item/ 以及 xhslink.com 短链接</p>
    </section>

    <!-- Status / loading -->
    <div id="statusArea" class="status-area hidden"></div>

    <!-- Result panel -->
    <section id="resultPanel" class="hidden">

      <!-- Post info -->
      <div class="card post-info">
        <div class="post-meta">
          <span class="post-meta-item" id="postType"></span>
          <span class="post-meta-item" id="postAuthor"></span>
          <span class="post-meta-item" id="postTime"></span>
          <span class="post-meta-item" id="postLikes"></span>
        </div>
        <h2 class="post-title" id="postTitle"></h2>
        <p class="post-desc" id="postDesc"></p>
      </div>

      <!-- Image selection toolbar -->
      <div class="card toolbar">
        <label class="checkbox-label">
          <input type="checkbox" id="selectAll" checked />
          全选
        </label>
        <span class="toolbar-info" id="selectInfo">已选择 0 张图片</span>
        <button class="btn btn-download" id="downloadBtn">⬇ 下载选中图片</button>
      </div>

      <!-- Image grid -->
      <div class="image-grid" id="imageGrid"></div>

      <!-- Download progress -->
      <div id="progressArea" class="hidden">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <p class="progress-text" id="progressText">准备下载...</p>
      </div>

    </section>

  </main>

  <!-- Settings modal -->
  <div class="modal-overlay hidden" id="settingsModal">
    <div class="modal">
      <div class="modal-header">
        <h2>设置</h2>
        <button class="btn btn-ghost modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="setDownloadDir">下载目录（服务器路径）</label>
          <input type="text" id="setDownloadDir" class="input" />
        </div>
        <div class="form-group">
          <label for="setImageFormat">图片格式</label>
          <select id="setImageFormat" class="input">
            <option value="jpeg">JPEG</option>
            <option value="png">PNG</option>
            <option value="webp">WEBP</option>
            <option value="auto">原始格式 (AUTO)</option>
          </select>
        </div>
        <div class="form-group checkbox-form-group">
          <label>
            <input type="checkbox" id="setAuthorArchive" />
            按作者分文件夹保存
          </label>
        </div>
        <div class="form-group">
          <label for="setCookie">Cookie（可选，登录后可获得更完整数据）</label>
          <textarea id="setCookie" class="input" rows="3" placeholder="从浏览器 F12 → Application → Cookies 复制"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="saveSettingsBtn">保存设置</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
